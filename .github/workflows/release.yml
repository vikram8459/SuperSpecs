name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build archives
        run: |
          NAME="superspecs-${GITHUB_REF_NAME}"
          mkdir -p releases
          git archive --format=zip    --prefix="$NAME/" -o "releases/$NAME.zip"    HEAD
          git archive --format=tar.gz --prefix="$NAME/" -o "releases/$NAME.tar.gz" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            releases/superspecs-${{ github.ref_name }}.zip
            releases/superspecs-${{ github.ref_name }}.tar.gz
