name: build

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & test (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Test (vitest)
        run: npm test

      - name: Audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Pack (dry-run publish)
        run: npm publish --dry-run
