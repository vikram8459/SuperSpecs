version: 2
updates:
  # npm dependencies (root package).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk dev tooling bumps into a single PR to reduce noise.
      dev-tooling:
        dependency-type: development

  # The brainstorm visual-companion sub-package has its own lockfile.
  - package-ecosystem: npm
    directory: "/skills/brainstorming/scripts"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
